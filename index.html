<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KM YRU Progress</title>
  <meta name="theme-color" content="#6c3bbd" />
  <script src="./config.js"></script>

  <style>
    :root{
      --primary:#6c3bbd;
      --primary-2:#8f5de8;
      --bg:#ffffff;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:var(--bg);
      overflow:hidden;
      font-family:"Sarabun","Segoe UI",Tahoma,sans-serif;
    }

    .app-shell{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      background:#fff;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      display:block;
      background:#fff;
    }

    .loading{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.96);
      z-index:10;
      transition:opacity .3s ease, visibility .3s ease;
    }

    .loading.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .loading-box{
      text-align:center;
      padding:24px;
    }

    .loading-spinner{
      width:54px;
      height:54px;
      margin:0 auto 14px;
      border-radius:50%;
      border:4px solid rgba(108,59,189,.15);
      border-top-color:var(--primary);
      border-right-color:var(--primary-2);
      animation:spin 1s linear infinite;
    }

    .loading h2{
      margin:0;
      font-size:20px;
      color:#2b2b2b;
    }

    .loading p{
      margin:8px 0 0;
      color:#666;
      font-size:14px;
    }

    .error-box{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.96);
      z-index:11;
      padding:20px;
    }

    .error-card{
      max-width:520px;
      width:100%;
      background:#fff;
      border:1px solid #eee;
      border-radius:18px;
      padding:24px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }

    .error-card h3{
      margin:0 0 10px;
      color:#8f1d1d;
    }

    .error-card p{
      margin:0 0 16px;
      color:#666;
      line-height:1.6;
    }

    .btn-row{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      font-size:14px;
      font-weight:600;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn-primary{
      background:linear-gradient(135deg, var(--primary), var(--primary-2));
      color:#fff;
    }

    .btn-secondary{
      background:#fff;
      color:#333;
      border:1px solid #ddd;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="loading" id="loading">
      <div class="loading-box">
        <div class="loading-spinner"></div>
        <h2 id="loadingTitle">กำลังเชื่อมต่อระบบ...</h2>
        <p>กรุณารอสักครู่</p>
      </div>
    </div>

    <div class="error-box" id="errorBox">
      <div class="error-card">
        <h3>ไม่สามารถแสดงผลผ่าน iframe ได้</h3>
        <p>
          อาจเกิดจากฝั่ง Google Apps Script ยังไม่อนุญาตให้ฝังใน iframe
          หรือ URL ของ Web App ไม่ถูกต้อง
        </p>
        <div class="btn-row">
          <a class="btn btn-primary" id="openDirectBtn" href="#" target="_blank" rel="noopener noreferrer">เปิดระบบโดยตรง</a>
          <button class="btn btn-secondary" type="button" onclick="location.reload()">ลองใหม่</button>
        </div>
      </div>
    </div>

    <iframe id="appFrame" title="KM YRU Progress"></iframe>
  </div>

  <script>
    (function () {
      const cfg = window.APP_CONFIG || {};
      const GAS_URL = cfg.GAS_URL || "";
      const LOADING_TEXT = cfg.LOADING_TEXT || "กำลังเชื่อมต่อระบบ...";
      const THEME_COLOR = cfg.THEME_COLOR || "#6c3bbd";
      const THEME_COLOR_2 = cfg.THEME_COLOR_2 || "#8f5de8";

      document.documentElement.style.setProperty("--primary", THEME_COLOR);
      document.documentElement.style.setProperty("--primary-2", THEME_COLOR_2);

      const iframe = document.getElementById("appFrame");
      const loading = document.getElementById("loading");
      const loadingTitle = document.getElementById("loadingTitle");
      const errorBox = document.getElementById("errorBox");
      const openDirectBtn = document.getElementById("openDirectBtn");

      loadingTitle.textContent = LOADING_TEXT;

      function buildTargetUrl() {
        const url = new URL(GAS_URL);
        const current = new URL(window.location.href);

        current.searchParams.forEach((value, key) => {
          url.searchParams.set(key, value);
        });

        if (current.hash) {
          url.hash = current.hash;
        }

        return url.toString();
      }

      if (!GAS_URL) {
        loading.classList.add("hide");
        errorBox.style.display = "flex";
        return;
      }

      const targetUrl = buildTargetUrl();
      openDirectBtn.href = targetUrl;

      let loaded = false;
      let failTimer = setTimeout(() => {
        if (!loaded) {
          loading.classList.add("hide");
          errorBox.style.display = "flex";
        }
      }, 12000);

      iframe.addEventListener("load", () => {
        loaded = true;
        clearTimeout(failTimer);
        loading.classList.add("hide");
      });

      iframe.src = targetUrl;
    })();
  </script>
</body>
</html>
